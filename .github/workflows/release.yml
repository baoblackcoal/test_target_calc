name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-source-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME#refs/tags/}"
          VERSION="$(python -c "from pycalc import __version__; print(__version__)")"
          if [ "v${VERSION}" != "${TAG_NAME}" ]; then
            echo "Tag ${TAG_NAME} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Run quality gate
        run: python scripts/check.py

      - name: Build Python package artifacts
        run: python -m build

      - name: Build web service artifact
        run: python scripts/package_web.py

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-python-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-web-artifact
          path: dist/pycalc-web-service-*.zip

  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME#refs/tags/}"
          VERSION="$(python -c "from pycalc import __version__; print(__version__)")"
          if [ "v${VERSION}" != "${TAG_NAME}" ]; then
            echo "Tag ${TAG_NAME} does not match package version v${VERSION}"
            exit 1
          fi

      - name: Run quality gate
        run: python scripts/check.py

      - name: Build Windows executable
        run: python scripts/package_exe.py

      - name: Smoke test executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\pycalc-cli-*-windows-*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable artifact was not created."
          }
          python scripts/smoke_test_exe.py $exe.FullName

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-windows-exe
          path: dist/pycalc-cli-*-windows-*.exe

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-source-artifacts
      - build-windows-exe
    permissions:
      contents: write
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: pycalc-python-artifacts
          path: dist

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: pycalc-web-artifact
          path: dist

      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: pycalc-windows-exe
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/pycalc-web-service-*.zip
            dist/pycalc-cli-*-windows-*.exe
