name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run quality gate
        run: python scripts/check.py

  package-windows-exe:
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build Windows executable
        run: python scripts/package_exe.py

      - name: Smoke test executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\pycalc-cli-*-windows-*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable artifact was not created."
          }
          & $exe.FullName --help

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-windows-exe
          path: dist/pycalc-cli-*-windows-*.exe
