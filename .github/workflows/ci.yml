name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run quality gate
        run: python scripts/check.py

  package-windows-exe:
    runs-on: windows-latest
    needs: quality
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build Windows executable
        run: python scripts/package_exe.py

      - name: Smoke test executable CLI
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\pycalc-cli-*-windows-*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable artifact was not created."
          }
          & $exe.FullName --help

      - name: Smoke test executable web mode
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\pycalc-cli-*-windows-*.exe | Select-Object -First 1
          if (-not $exe) {
            throw "Executable artifact was not created."
          }
          $process = Start-Process -FilePath $exe.FullName -ArgumentList "--web","--host","127.0.0.1","--port","8765" -PassThru
          try {
            $ready = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:8765/" -UseBasicParsing
                if ($response.Content -match "pycalc" -and $response.Content -match 'value="1\+2"') {
                  $ready = $true
                  break
                }
              } catch {
              }
              Start-Sleep -Seconds 1
            }
            if (-not $ready) {
              throw "Executable web mode did not become ready."
            }
          } finally {
            if ($null -ne $process -and -not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
              Wait-Process -Id $process.Id
            }
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: pycalc-windows-exe
          path: dist/pycalc-cli-*-windows-*.exe
